name: voiceapp
description: A voice conversation app powered by Claude AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Speech-to-text (on-device)
  speech_to_text: ^7.0.0

  # Text-to-speech (on-device)
  flutter_tts: ^4.0.0

  # Claude API
  anthropic_sdk_dart: ^1.3.1

  # OpenAI-compatible API (vLLM, etc.)
  openai_dart: ^0.4.2

  # Settings persistence
  shared_preferences: ^2.3.0

  # UUID for message IDs
  uuid: ^4.4.0

  # HTTP client (used internally by SDKs)
  http: ^1.2.0

  # Collection utilities (firstWhereOrNull, etc.)
  collection: ^1.18.0

  # Audio playback for network TTS
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3
  fake_async: ^1.3.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/clawtalk_icon.png"
  adaptive_icon_background: "#F5F5F2"
  adaptive_icon_foreground: "assets/icon/clawtalk_icon.png"
  min_sdk_android: 21
